<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title | default("Cortex") }}{% endblock %}</title>

    <!-- DaisyUI + Tailwind CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.2/ws.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/cortex.css">

    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-base-200">
    {% include "components/navbar.html" %}

    <main class="container mx-auto px-4 py-6 max-w-6xl">
        {% block content %}{% endblock %}
    </main>

    <!-- Custom JS -->
    <script src="/static/js/cortex.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
